name: mo-storefront

services:
  db-user:
    image: postgres:16-alpine
    container_name: mo-db-user
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_db
    ports:
      - '5436:5432'
    volumes:
      - user-data:/var/lib/postgresql/data

volumes:
  user-data:
