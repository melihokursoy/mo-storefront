name: mo-storefront

services:
  db-order:
    image: postgres:16-alpine
    container_name: mo-db-order
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_db
    ports:
      - '5434:5432'
    volumes:
      - order-data:/var/lib/postgresql/data

volumes:
  order-data:
