name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    env:
      # Prisma database URLs for e2e tests (each subgraph manages its own database via docker-compose)
      DATABASE_URL_PRODUCT: postgresql://postgres:postgres@localhost:5432/product_db
      DATABASE_URL_CART: postgresql://postgres:postgres@localhost:5433/cart_db
      DATABASE_URL_ORDER: postgresql://postgres:postgres@localhost:5434/order_db

    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm i
      - run: npx playwright install --with-deps
      - run: npm run db:generate:product && npm run db:generate:cart && npm run db:generate:order
      - run: npx nx format:check --base="remotes/origin/main"
      - run: npx nx run-many -t lint test typecheck build e2e
