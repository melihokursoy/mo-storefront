name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    env:
      # Prisma database URLs for e2e tests (each subgraph manages its own database via docker-compose)
      DATABASE_URL_PRODUCT: postgresql://postgres:postgres@localhost:5432/product_db
      DATABASE_URL_CART: postgresql://postgres:postgres@localhost:5433/cart_db
      DATABASE_URL_ORDER: postgresql://postgres:postgres@localhost:5434/order_db
      DATABASE_URL_USER: postgresql://postgres:postgres@localhost:5436/user_db
      DATABASE_URL_AUTH: postgresql://postgres:postgres@localhost:5435/auth_db
      # Disable Node inspector in CI to avoid port conflicts when running tests in parallel
      NODE_OPTIONS: --no-warnings
      # Allow built services to resolve workspace packages from root node_modules
      NODE_PATH: /home/runner/work/mo-storefront/mo-storefront/node_modules

    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm i
      - run: npx playwright install --with-deps
      - run: npx nx format:check --base="remotes/origin/main"
      - run: npx nx run-many -t lint test typecheck build
      - run: npx nx run-many -t e2e -projects=p"*-e2e"
